# =============================================================================
# MAE Configuration for Histopathology Self-Supervised Pretraining
# Reference: He et al., "Masked Autoencoders Are Scalable Vision Learners",
#            CVPR 2022.
# =============================================================================

experiment:
  name: "mae_histo_pretrain"
  output_dir: "outputs/mae"
  seed: 42
  log_every: 50
  save_every: 10

data:
  dataset: "patchcamelyon"
  data_root: "data/patchcamelyon"
  image_size: 96
  num_workers: 8
  pin_memory: true

model:
  encoder:
    arch: "vit_base"
    patch_size: 8
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    drop_path_rate: 0.1
    use_cls_token: true

  decoder:
    embed_dim: 512
    depth: 8
    num_heads: 16
    mlp_ratio: 4.0

mae:
  mask_ratio: 0.75                  # fraction of patches masked
  norm_pix_loss: true               # normalise pixel targets per patch

optimizer:
  name: "adamw"
  base_lr: 1.5e-4
  weight_decay: 0.05
  beta1: 0.9
  beta2: 0.95
  clip_grad: 1.0

scheduler:
  name: "cosine"
  warmup_epochs: 40
  min_lr: 0.0

training:
  epochs: 800
  batch_size: 512
  fp16: true

augmentation:
  random_resized_crop:
    scale: [0.2, 1.0]
    ratio: [0.75, 1.33]
  horizontal_flip: true
  vertical_flip: true
  stain_jitter:
    enabled: true
    sigma1: 0.2
    sigma2: 0.2
    prob: 0.5
  normalize:
    mean: [0.7008, 0.5384, 0.6916]
    std:  [0.2350, 0.2774, 0.2128]
